env:
  AWS_DEFAULT_REGION: us-east-1

steps:
  - name: ":golangci-lint: Lint"
    plugins:
      - docker#v5.13.0:
          image: golangci/golangci-lint:v2.5.0
          workdir: /go/src/github.com/your-org/your-repo
          command:
            - golangci-lint
            - run

  - name: ":go: Tests"
    command: ".buildkite/steps/tests.sh"
    parallelism: 2
    artifact_paths:
      - cover.{html,out}
    plugins:
      - docker-compose#v4.14.0:
          config: .buildkite/docker-compose.yml
          cli-version: 2
          run: ci
          propagate-environment: true
          mount-buildkite-agent: true

  - wait

  - group: ":hammer_and_wrench: Build binaries"
    steps:
    - name: ":{{matrix.os}}: Build {{matrix.os}} {{matrix.arch}} binary"
      artifact_paths: "dist/**/*"
      plugins:
        docker#v5.13.0:
          image: goreleaser/goreleaser:v2.15.1
          mount-buildkite-agent: true
          environment:
            - GOOS={{matrix.os}}
            - GOARCH={{matrix.arch}}
          command:
            - build
            - --single-target
            - --snapshot
      matrix:
        setup:
          os:
            - darwin
            - linux
            - windows
          arch:
            - amd64
            - arm64
